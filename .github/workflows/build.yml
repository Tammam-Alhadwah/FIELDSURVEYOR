name: Build & Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ── 1. Build the Android APK ──────────────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web files into Android
        run: npx cap sync android

      - name: Inject Android Location Permissions
        run: |
          node -e "
            const fs = require('fs');
            const file = 'android/app/src/main/AndroidManifest.xml';

            if (!fs.existsSync(file)) {
              console.error('ERROR: AndroidManifest.xml not found at ' + file);
              process.exit(1);
            }

            let xml = fs.readFileSync(file, 'utf8');

            const permissions = [
              'android.permission.ACCESS_COARSE_LOCATION',
              'android.permission.ACCESS_FINE_LOCATION'
            ];

            let changed = false;
            for (const perm of permissions) {
              if (xml.includes(perm)) {
                console.log('SKIP (already present): ' + perm);
              } else {
                const tag = '    <uses-permission android:name=\"' + perm + '\" />';
                // Insert before </manifest> — fail loudly if the closing tag is missing.
                if (!xml.includes('</manifest>')) {
                  console.error('ERROR: </manifest> closing tag not found. Manifest may be malformed.');
                  process.exit(1);
                }
                xml = xml.replace('</manifest>', tag + '\n</manifest>');
                console.log('INJECTED: ' + perm);
                changed = true;
              }
            }

            if (changed) {
              fs.writeFileSync(file, xml);
              console.log('AndroidManifest.xml updated successfully.');
            } else {
              console.log('AndroidManifest.xml unchanged — all permissions were already present.');
            }
          "

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: false
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Deploy GitHub Pages from www/ ─────────────
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: www/

      - id: deployment
        uses: actions/deploy-pages@v4
